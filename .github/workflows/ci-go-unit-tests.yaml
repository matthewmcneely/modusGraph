name: ci-go-unit-tests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
      - "**/*.md"
      - .github/workflows/*

permissions:
  contents: read
  actions: write

jobs:
  ci-go-tests:
    timeout-minutes: 20
    name: Test ${{ matrix.os }}
    runs-on:
      "${{ matrix.os == 'linux' && 'ubuntu-latest' || matrix.os == 'macos' && 'macos-latest'}}"

    strategy:
      fail-fast: false
      matrix:
        os: [linux, macos]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.0
          cache-dependency-path: go.sum

      - name: Set up Dgraph
        if: matrix.os == 'linux'
        run: |
          docker run -d --name dgraph-standalone -p 9080:9080 -p 8080:8080 dgraph/standalone:latest
          echo "Waiting for Dgraph to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/health > /dev/null; then
              echo "Dgraph is ready!"
              break
            fi
            echo "Attempt $i: Dgraph not ready, waiting..."
            sleep 2
          done
          sleep 5

      - name: Run Unit Tests
        env:
          MODUSGRAPH_TEST_ADDR: ${{ matrix.os == 'linux' && 'localhost:9080' || '' }}
        run: go test -short -race -v .
